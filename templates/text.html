<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🔤 Universal Text Cipher Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: radial-gradient(circle at 50% 30%, #1e2640 0%, #0a0d14 100%);
        min-height: 100vh;
        color: #ffffff;
        padding: 60px 0;
      }
      
      /* Premium Floating Glassmorphic Container */
      .crypto-box {
        background: rgba(15, 22, 36, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(99, 102, 241, 0.15);
        border-radius: 28px;
        padding: 3rem;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 
                    0 0 50px rgba(99, 102, 241, 0.03);
        transition: border-color 0.3s ease;
      }
      .crypto-box:hover {
        border-color: rgba(99, 102, 241, 0.25);
      }

      /* Cyber Typography */
      .vault-title {
        font-weight: 800;
        letter-spacing: -1.5px;
        background: linear-gradient(135deg, #ffffff 40%, #c7d2fe 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .endpoint-badge {
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 2px;
        color: #818cf8;
        font-size: 0.75rem;
        font-weight: 700;
      }

      /* Sleek Inputs with Custom Transitions */
      .form-label {
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .form-control {
        background: rgba(7, 10, 15, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #ffffff !important;
        border-radius: 14px;
        padding: 14px;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .form-control:focus {
        background: #070a0f;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      }
      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
      
      /* Perfected Password Layout & Hover States */
      .password-wrapper {
        position: relative;
        width: 100%;
      }
      .form-control-pass {
        padding-right: 50px !important;
      }
      .password-toggle-btn {
        position: absolute;
        right: 4px;
        top: 4px;
        bottom: 4px;
        width: 44px;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.4);
        cursor: pointer;
        font-size: 1.15rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        transition: all 0.2s ease;
      }
      .password-toggle-btn:hover {
        color: #6366f1;
        background: rgba(255, 255, 255, 0.05);
      }

      /* Premium Cyber Buttons */
      .cyber-btn {
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.5px;
        border-radius: 14px;
        padding: 14px 28px;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
      }
      .btn-text-mode {
        background: linear-gradient(135deg, #0ef2a1 0%, #00b372 100%);
        color: #051911 !important;
        box-shadow: 0 4px 20px rgba(14, 242, 161, 0.15);
      }
      .btn-text-mode:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(14, 242, 161, 0.35);
        filter: brightness(1.1);
      }
      .btn-file-mode {
        background: rgba(255, 255, 255, 0.06);
        color: #ffffff !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .btn-file-mode:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 25px rgba(255, 255, 255, 0.05);
      }

      /* Matrix-Style Glowing Output Box */
      .result-container {
        border-color: rgba(14, 242, 161, 0.2) !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                    0 0 40px rgba(14, 242, 161, 0.02);
      }
      .result-box {
        font-family: 'JetBrains Mono', monospace;
        background: #05070a;
        border: 1px solid rgba(14, 242, 161, 0.15);
        border-radius: 14px;
        color: #0ef2a1;
        font-size: 0.95rem;
        line-height: 1.6;
        padding: 1.25rem;
        box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
      }
      
      .btn-back {
        color: rgba(255, 255, 255, 0.6);
        border-color: rgba(255, 255, 255, 0.1);
        transition: all 0.2s;
      }
      .btn-back:hover {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.25);
      }

      /* Action buttons for micro utility modules */
      .action-micro-btn {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: rgba(14, 242, 161, 0.08);
        color: #0ef2a1;
        border: 1px solid rgba(14, 242, 161, 0.25);
        border-radius: 8px;
        padding: 5px 14px;
        transition: all 0.2s ease;
      }
      .action-micro-btn:hover {
        background: rgba(14, 242, 161, 0.18);
        border-color: rgba(14, 242, 161, 0.45);
        transform: translateY(-1px);
      }
      
      /* Subtle dark styling specific for clear variant */
      .btn-clear-style {
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.6);
        border-color: rgba(255, 255, 255, 0.1);
      }
      .btn-clear-style:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="mb-4">
                    <a href="/" class="btn btn-back btn-sm rounded-pill px-3">← Back to Main Framework</a>
                </div>

                {% if error %}
                <div class="alert alert-danger bg-danger text-white border-0 rounded-4 mb-4" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <div class="crypto-box">
                    <h2 class="vault-title mb-1 text-center">🔤 Text Cipher Engine</h2>
                    <p class="text-center endpoint-badge mb-5">UNIVERSAL CRYPTO ROUTE</p>
                    
                    <form action="/text" method="POST">
                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label text-secondary fw-semibold mb-0">Payload Data (Message or Ciphertext):</label>
                                <div class="d-flex gap-2">
                                    <button type="button" id="clearPayloadBtn" class="action-micro-btn btn-clear-style">
                                        🧹 Clear
                                    </button>
                                    <button type="button" id="pastePayloadBtn" class="action-micro-btn">
                                        📋 Paste Content
                                    </button>
                                </div>
                            </div>
                            <textarea class="form-control" id="textToProcess" name="text_to_process" rows="4" required placeholder="Type regular text to encrypt OR paste base64 tokens to decrypt..."></textarea>
                        </div>

                        <div class="mb-5">
                            <label class="form-label text-secondary fw-semibold">Secret Authorization Key:</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control form-control-pass" id="passwordField" name="password" required placeholder="Enter private key passphrase">
                                <button type="button" id="togglePassword" class="password-toggle-btn" title="Toggle Password Visibility">
                                    👁️
                                </button>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" name="action" value="encrypt" class="cyber-btn btn-text-mode flex-fill">🛡️ Run Encryption</button>
                            <button type="submit" name="action" value="decrypt" class="cyber-btn btn-file-mode flex-fill">🔓 Run Decryption</button>
                        </div>
                    </form>
                </div>

                {% if result %}
                <div class="crypto-box result-container mt-4 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="text-secondary fw-semibold mb-0" style="font-size: 0.85rem; letter-spacing: 0.5px; text-transform: uppercase;">📋 Output Stream Matrix:</h5>
                        <button type="button" id="copyTokenBtn" class="action-micro-btn">
                            📋 Copy Token
                        </button>
                    </div>
                    <div class="p-3 result-box text-break" id="outputPayload">
                        {{ result }}
                    </div>
                </div>
                {% endif %}

            </div>
        </div>
    </div>

    <script>
        // Password fields toggle visualization engine
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#passwordField');

        togglePassword.addEventListener('click', function () {
            const currentType = passwordInput.getAttribute('type');
            const targetType = currentType === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', targetType);
            this.textContent = targetType === 'password' ? '👁️' : '🙈';
        });

        // Textarea clear engine sequence
        const clearPayloadBtn = document.querySelector('#clearPayloadBtn');
        const textToProcess = document.querySelector('#textToProcess');

        if (clearPayloadBtn && textToProcess) {
            clearPayloadBtn.addEventListener('click', function () {
                textToProcess.value = '';
                textToProcess.focus();
            });
        }

        // Clipboard asynchronous Paste operational engine
        const pastePayloadBtn = document.querySelector('#pastePayloadBtn');

        if (pastePayloadBtn && textToProcess) {
            pastePayloadBtn.addEventListener('click', function () {
                navigator.clipboard.readText().then(text => {
                    textToProcess.value = text;
                    
                    // Visual state indicator update
                    pastePayloadBtn.innerHTML = '✅ Pasted!';
                    pastePayloadBtn.style.background = 'rgba(14, 242, 161, 0.2)';
                    pastePayloadBtn.style.color = '#ffffff';

                    setTimeout(() => {
                        pastePayloadBtn.innerHTML = '📋 Paste Content';
                        pastePayloadBtn.style.background = 'rgba(14, 242, 161, 0.08)';
                        pastePayloadBtn.style.color = '#0ef2a1';
                    }, 2200);
                }).catch(err => {
                    alert('Browser security blocked clipboard access. Please manually use Ctrl+V / Cmd+V.');
                    console.error('Permissions denied on navigator reading sequence: ', err);
                });
            });
        }

        // Clipboard asynchronous Copy operational engine
        const copyTokenBtn = document.querySelector('#copyTokenBtn');
        const outputPayload = document.querySelector('#outputPayload');

        if (copyTokenBtn && outputPayload) {
            copyTokenBtn.addEventListener('click', function () {
                const textToCopy = outputPayload.textContent.trim();

                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyTokenBtn.innerHTML = '✅ Token Copied!';
                    copyTokenBtn.style.background = 'rgba(14, 242, 161, 0.2)';
                    copyTokenBtn.style.color = '#ffffff';
                    
                    setTimeout(() => {
                        copyTokenBtn.innerHTML = '📋 Copy Token';
                        copyTokenBtn.style.background = 'rgba(14, 242, 161, 0.08)';
                        copyTokenBtn.style.color = '#0ef2a1';
                    }, 2200);
                }).catch(err => {
                    console.error('Core security environment denied clipboard pipeline access: ', err);
                });
            });
        }
    </script>
  </body>
</html>
